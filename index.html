<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Line Energy — Registru & Stoc Piese</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090a;--bg1:#090c0e;--bg2:#0b0f12;--bg3:#0c1014;--bg4:#080b0d;--brd:#151c22;--brd2:#1e2830;--tx:#e0e6ec;--tx2:#8aa8b8;--tx3:#6a8898;--tx4:#5a7888;--tx5:#2a3840;--acc:#0ea5e9;--grn:#34d399;--ylw:#fbbf24;--red:#f87171;--blu:#60a5fa;--fn:'IBM Plex Mono',monospace;--fh:'Outfit',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}body{background:transparent;color:var(--tx);font-family:var(--fn);font-size:18px;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}
input,select,textarea{background:var(--bg3);border:1px solid var(--brd2);color:var(--tx);padding:10px 14px;border-radius:4px;font-family:var(--fn);font-size:16px;outline:none;width:100%;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:rgba(14,165,233,.25)}select option{background:var(--bg3)}textarea{resize:vertical}
.b{padding:6px 12px;border-radius:4px;cursor:pointer;font-family:var(--fn);font-size:13px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;border:1px solid transparent;display:inline-block}
.bp{background:linear-gradient(135deg,#0c4a6e,#0369a1);color:#bae6fd;border-color:rgba(14,165,233,.19)}.bp:hover{background:linear-gradient(135deg,#0369a1,#0284c7)}
.bs{background:#0f1318;color:var(--tx2);border-color:var(--brd2)}.bs:hover{border-color:var(--tx3);color:var(--tx)}
.bd{background:#1a0808;color:var(--red);border-color:rgba(248,113,113,.13)}.bd:hover{background:#2a0c0c}
.bg{background:linear-gradient(135deg,#064e3b,#047857);color:#a7f3d0;border-color:rgba(16,185,129,.19)}.bg:hover{background:linear-gradient(135deg,#047857,#059669)}
.bo{background:linear-gradient(135deg,#7c2d12,#c2410c);color:#fed7aa;border-color:rgba(249,115,22,.25)}.bo:hover{background:linear-gradient(135deg,#c2410c,#ea580c)}
.tg{display:inline-block;padding:2px 7px;border-radius:3px;font-size:12px;font-weight:700;letter-spacing:.7px;text-transform:uppercase}
.lbl{font-size:12px;color:var(--tx4);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:3px;font-weight:600}
.ib{background:var(--bg4);border:1px solid var(--brd);border-radius:5px;padding:12px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;transition:opacity .2s}.mo.show{opacity:1}
.ml{background:var(--bg2);border:1px solid rgba(14,165,233,.08);border-radius:10px;max-width:800px;width:96%;max-height:92vh;overflow-y:auto;box-shadow:0 0 80px rgba(14,165,233,.06);transform:translateY(10px);transition:transform .2s}.mo.show .ml{transform:translateY(0)}
.wtab{padding:10px 18px;font-size:15px;font-weight:600;cursor:pointer;border:none;background:none;color:#8ab0c0;border-bottom:2px solid transparent;transition:all .15s;font-family:var(--fn)}.wtab.ac{color:var(--acc);border-bottom-color:var(--acc)}.wtab:hover{color:#93c5fd}
.stab{padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:rgba(12,16,20,.7);color:#8ab0c0;border-radius:4px;font-family:var(--fn);transition:all .15s;border:1px solid var(--brd)}.stab.ac{background:rgba(14,165,233,.1);color:var(--acc);border-color:rgba(14,165,233,.25)}
.row{transition:background .1s}.row:hover{background:#0d1216}
.img-hero{width:100%;height:220px;object-fit:cover;border-radius:10px 10px 0 0;display:block;border-bottom:1px solid var(--brd)}
.img-placeholder{width:100%;height:220px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d1216,var(--bg2));border-radius:10px 10px 0 0;border-bottom:1px solid var(--brd)}
.img-strip{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;border-bottom:1px solid var(--brd)}
.img-thumb{width:80px;height:60px;object-fit:cover;border-radius:4px;border:2px solid var(--brd);cursor:pointer;transition:border-color .15s;flex-shrink:0}.img-thumb:hover{border-color:var(--acc)}
.img-thumb.active{border-color:var(--acc)}
.img-rm{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:9px;cursor:pointer;line-height:16px;text-align:center;display:none}.img-wrap:hover .img-rm{display:block}
.img-wrap{position:relative;flex-shrink:0}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.fullscreen-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;display:flex;align-items:center;justify-content:center;cursor:zoom-out;opacity:0;transition:opacity .25s}
.fullscreen-overlay.show{opacity:1}
.fullscreen-overlay img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:6px;box-shadow:0 0 60px rgba(0,0,0,.5)}
.fullscreen-close{position:fixed;top:16px;right:16px;z-index:201;background:rgba(255,255,255,.15);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.fullscreen-close:hover{background:rgba(255,255,255,.3)}
.img-hero{cursor:zoom-in}
.img-thumb{cursor:pointer}

/* SCENIC BACKGROUND */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background: 
    /* Sky gradient */
    linear-gradient(180deg, 
      #87CEEB 0%, 
      #a8d8f0 30%,
      #c5e4f5 50%,
      #d4ecf7 65%,
      #e8f4f8 75%,
      #f0f7f0 85%,
      #4a8c3f 85.1%,
      #3d7a35 90%,
      #2d6b28 100%
    );
}

/* Hills overlay with curves */
body::after {
  content: '';
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 35vh;
  z-index: -1;
  background: 
    /* Rolling hills */
    radial-gradient(ellipse 80% 60% at 15% 100%, #3a8035 0%, transparent 70%),
    radial-gradient(ellipse 70% 50% at 45% 100%, #4a9040 0%, transparent 65%),
    radial-gradient(ellipse 90% 55% at 75% 100%, #358030 0%, transparent 70%),
    radial-gradient(ellipse 60% 45% at 95% 100%, #4a8c3f 0%, transparent 60%);
}

/* Wind turbines as fixed SVG overlay */
.bg-turbines {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  opacity: 0.70;
}

/* Semi-transparent content overlay for readability */
#app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  background: rgba(7, 9, 10, 0.55);
  backdrop-filter: blur(1px);
}

/* Clouds animation */
@keyframes cloudFloat {
  0% { transform: translateX(-10px); }
  50% { transform: translateX(10px); }
  100% { transform: translateX(-10px); }
}
@keyframes cloudFloat2 {
  0% { transform: translateX(8px); }
  50% { transform: translateX(-8px); }
  100% { transform: translateX(8px); }
}
@keyframes bladeSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}


/* === THEME SYSTEM === */
body.theme-scenic .bg-turbines{opacity:.70}
body.theme-scenic #app{background:rgba(7,9,10,.55)}

body.theme-navy{background:#0a1423!important}
body.theme-navy .bg-turbines{display:none}
body.theme-navy #app{background:rgba(10,20,35,.92)}
body.theme-navy header{background:rgba(14,26,46,.9)!important}

body.theme-slate{background:#1e293b!important}
body.theme-slate .bg-turbines{display:none}
body.theme-slate #app{background:rgba(30,41,59,.92)}
body.theme-slate header{background:rgba(39,53,72,.9)!important}
body.theme-slate .stab{background:rgba(39,53,72,.8)!important}

body.theme-forest{background:#05140e!important}
body.theme-forest .bg-turbines{display:none}
body.theme-forest #app{background:rgba(5,20,14,.92)}
body.theme-forest header{background:rgba(10,32,24,.9)!important}
body.theme-forest .stab{background:rgba(10,32,24,.8)!important}

body.theme-light{background:#f0f4f8!important}
body.theme-light .bg-turbines{display:none}
body.theme-light #app{background:rgba(240,244,248,.96);color:#1e293b}
body.theme-light header{background:rgba(255,255,255,.95)!important;border-color:#e2e8f0!important}
body.theme-light h1{color:#1e293b!important}
body.theme-light h1 span{color:#0369a1!important}
body.theme-light .wtab{color:#64748b!important}
body.theme-light .wtab.ac{color:#0369a1!important;border-bottom-color:#0369a1!important}
body.theme-light .stab{background:#fff!important;color:#64748b!important;border-color:#e2e8f0!important}
body.theme-light .stab.ac{background:rgba(3,105,161,.08)!important;color:#0369a1!important;border-color:rgba(3,105,161,.3)!important}
body.theme-light table{color:#334155}
body.theme-light .row:hover{background:rgba(14,165,233,.04)!important}
body.theme-light th{color:#64748b!important}
body.theme-light td{color:#475569!important}
body.theme-light input,body.theme-light select,body.theme-light textarea{background:#fff!important;border-color:#d1d5db!important;color:#1e293b!important}
body.theme-light .ib{background:#f8fafc!important;border-color:#e2e8f0!important}
body.theme-light .ml{background:#fff!important;border-color:#e2e8f0!important}
body.theme-light .tg{font-weight:800}
body.theme-light .lbl{color:#64748b!important}
body.theme-light .b.bs{background:#f1f5f9!important;color:#475569!important;border-color:#d1d5db!important}
body.theme-light .b.bp{background:linear-gradient(135deg,#0369a1,#0284c7)!important;color:#fff!important}

body.theme-dark{background:#07090a!important}
body.theme-dark .bg-turbines{display:none}
body.theme-dark #app{background:rgba(7,9,10,.98)}
body.theme-dark header{background:rgba(9,12,14,.98)!important}

/* Theme selector button */
.theme-btn{position:relative;display:inline-block}
.theme-menu{position:absolute;top:100%;right:0;margin-top:6px;background:rgba(11,15,18,.95);border:1px solid var(--brd);border-radius:8px;padding:8px;min-width:200px;z-index:60;display:none;backdrop-filter:blur(10px);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.theme-menu.show{display:block}
.theme-opt{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;transition:background .15s;font-size:13px;color:#c8cfd5;border:none;background:none;width:100%;text-align:left;font-family:var(--fn)}
.theme-opt:hover{background:rgba(14,165,233,.1)}
.theme-opt.active{background:rgba(14,165,233,.15);color:var(--acc)}
.theme-dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.2);flex-shrink:0}
body.theme-light .theme-menu{background:rgba(255,255,255,.95)!important;border-color:#e2e8f0!important}
body.theme-light .theme-opt{color:#334155!important}
body.theme-light .theme-opt:hover{background:rgba(3,105,161,.06)!important}
body.theme-light .theme-opt.active{color:#0369a1!important}


/* === GOLDEN SUNSET OFFSHORE THEME === */
body.theme-sunset{background:#1a1008!important}
body.theme-sunset .bg-turbines{display:none}
body.theme-sunset #app{background:rgba(20,14,5,.58)}
body.theme-sunset header{background:rgba(25,18,8,.78)!important;backdrop-filter:blur(8px)!important}
body.theme-sunset h1{color:#f5e6c8!important}
body.theme-sunset h1 span{color:#f0a030!important}
body.theme-sunset .wtab{color:#a08860!important}
body.theme-sunset .wtab.ac{color:#f0a030!important;border-bottom-color:#f0a030!important}
body.theme-sunset .stab{background:rgba(30,22,10,.7)!important;color:#b09870!important;border-color:rgba(200,160,80,.15)!important}
body.theme-sunset .stab.ac{background:rgba(240,160,48,.1)!important;color:#f0a030!important;border-color:rgba(240,160,48,.3)!important}
body.theme-sunset .b.bp{background:linear-gradient(135deg,#8b5e14,#b8860b)!important;color:#fef3c7!important;border-color:rgba(240,160,48,.3)!important}
body.theme-sunset .b.bs{background:rgba(30,22,10,.6)!important;color:#b09870!important;border-color:rgba(200,160,80,.2)!important}
body.theme-sunset .b.bg{background:linear-gradient(135deg,#5a6e20,#7a8e30)!important}
body.theme-sunset .b.bo{background:linear-gradient(135deg,#8b4513,#cd6600)!important}
body.theme-sunset input,body.theme-sunset select,body.theme-sunset textarea{background:rgba(20,14,5,.7)!important;border-color:rgba(200,160,80,.2)!important;color:#e8d8b8!important}
body.theme-sunset .ib{background:rgba(20,14,5,.5)!important;border-color:rgba(200,160,80,.15)!important}
body.theme-sunset .ml{background:rgba(25,18,8,.95)!important;border-color:rgba(240,160,48,.1)!important}
body.theme-sunset .lbl{color:#907850!important}
body.theme-sunset th{color:#907850!important}
body.theme-sunset .row:hover{background:rgba(240,160,48,.06)!important}

/* Sunset scene */
.sunset-scene{position:fixed;inset:0;z-index:-1;overflow:hidden}
.sunset-sky{position:absolute;inset:0;background:linear-gradient(180deg,#2c1810 0%,#5a2a10 15%,#c06820 30%,#e8a040 45%,#f0c060 55%,#e8b848 62%,#c09030 68%,#1a3a5a 68.5%,#15304a 75%,#102540 100%)}
.sunset-sun{position:absolute;width:180px;height:180px;border-radius:50%;top:18%;left:50%;transform:translateX(-50%);background:radial-gradient(circle,#fff8e0 0%,#ffe080 30%,#f0a030 60%,rgba(240,160,48,0) 100%);box-shadow:0 0 80px 40px rgba(255,200,80,.3),0 0 160px 80px rgba(240,160,48,.15);animation:sunPulse 6s ease-in-out infinite}
@keyframes sunPulse{0%,100%{box-shadow:0 0 80px 40px rgba(255,200,80,.3),0 0 160px 80px rgba(240,160,48,.15)}50%{box-shadow:0 0 100px 50px rgba(255,200,80,.35),0 0 200px 100px rgba(240,160,48,.2)}}

/* Water */
.sunset-water{position:absolute;bottom:0;left:0;right:0;height:35%;background:linear-gradient(180deg,rgba(26,58,90,.6) 0%,rgba(15,30,50,.8) 100%)}
.sunset-water::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 8px,rgba(240,180,80,.04) 8px,rgba(240,180,80,.04) 10px);animation:waterShimmer 3s ease-in-out infinite}
.sunset-water::after{content:'';position:absolute;top:0;left:30%;right:30%;height:60%;background:linear-gradient(180deg,rgba(255,200,80,.12) 0%,transparent 100%);filter:blur(20px);animation:waterReflect 4s ease-in-out infinite}
@keyframes waterShimmer{0%,100%{transform:translateY(0)}50%{transform:translateY(2px)}}
@keyframes waterReflect{0%,100%{opacity:.8;transform:scaleX(1)}50%{opacity:1;transform:scaleX(1.05)}}

/* Clouds in sunset */
.sunset-cloud{position:absolute;border-radius:50%;filter:blur(2px)}
@keyframes driftRight{0%{transform:translateX(-5px)}50%{transform:translateX(5px)}100%{transform:translateX(-5px)}}
@keyframes driftLeft{0%{transform:translateX(5px)}50%{transform:translateX(-5px)}100%{transform:translateX(5px)}}

/* Offshore turbine silhouettes */
.oturbine{position:absolute;bottom:32%}
.oturbine .pole{width:4px;background:linear-gradient(180deg,#1a1008,#2a1a10);position:absolute;bottom:0;left:50%;transform:translateX(-50%);border-radius:2px}
.oturbine .nacelle{width:12px;height:6px;background:#1a1008;position:absolute;top:0;left:50%;transform:translateX(-50%);border-radius:2px}
.oturbine .blades{position:absolute;top:3px;left:50%;transform-origin:0 0}
.oturbine .blade{position:absolute;width:3px;background:linear-gradient(0deg,#2a1a10,#3a2a18);border-radius:2px;transform-origin:bottom center;left:-1.5px}
@keyframes spin1{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spin2{from{transform:rotate(120deg)}to{transform:rotate(480deg)}}
@keyframes spin3{from{transform:rotate(60deg)}to{transform:rotate(420deg)}}

/* Reflection lines for turbines */
.oturbine .reflection{position:absolute;bottom:-40px;left:50%;transform:translateX(-50%);width:2px;height:40px;background:linear-gradient(180deg,rgba(30,20,10,.4),transparent);filter:blur(1px);animation:waterShimmer 3s ease-in-out infinite}

body:not(.theme-sunset) .sunset-scene{display:none}

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div class="bg-turbines">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" style="width:100%;height:100%">
  <!-- Sky -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ba3d9"/>
      <stop offset="60%" stop-color="#87CEEB"/>
      <stop offset="80%" stop-color="#a8d8f0"/>
      <stop offset="100%" stop-color="#c5e8c5"/>
    </linearGradient>
    <radialGradient id="sun" cx="80%" cy="15%" r="20%">
      <stop offset="0%" stop-color="#fff8e1" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#fff8e1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#sun)"/>
  
  <!-- Clouds -->
  <g opacity=".85">
    <ellipse cx="250" cy="150" rx="80" ry="30" fill="white" style="animation:cloudFloat 8s ease-in-out infinite"/>
    <ellipse cx="290" cy="140" rx="60" ry="25" fill="white" style="animation:cloudFloat 8s ease-in-out infinite"/>
    <ellipse cx="700" cy="100" rx="90" ry="35" fill="white" style="animation:cloudFloat2 10s ease-in-out infinite"/>
    <ellipse cx="750" cy="90" rx="65" ry="28" fill="white" style="animation:cloudFloat2 10s ease-in-out infinite"/>
    <ellipse cx="1300" cy="130" rx="70" ry="28" fill="white" style="animation:cloudFloat 12s ease-in-out infinite"/>
    <ellipse cx="1340" cy="120" rx="55" ry="22" fill="white" style="animation:cloudFloat 12s ease-in-out infinite"/>
    <ellipse cx="1650" cy="170" rx="60" ry="22" fill="white" style="animation:cloudFloat2 9s ease-in-out infinite"/>
  </g>
  
  <!-- Hills -->
  <path d="M0 750 Q200 680 400 720 Q600 760 800 710 Q1000 660 1200 700 Q1400 740 1600 690 Q1800 650 1920 700 L1920 1080 L0 1080Z" fill="#4a9040"/>
  <path d="M0 800 Q300 740 500 770 Q700 800 900 760 Q1100 720 1300 760 Q1500 800 1700 750 Q1850 720 1920 750 L1920 1080 L0 1080Z" fill="#3d7a35"/>
  <path d="M0 850 Q250 810 450 830 Q650 850 850 820 Q1050 790 1250 820 Q1450 850 1650 810 Q1800 790 1920 820 L1920 1080 L0 1080Z" fill="#2d6b28"/>
  
  <!-- Turbine 1 (far left, small) -->
  <g transform="translate(180,520)">
    <rect x="-3" y="0" width="6" height="200" fill="#e0e0e0" rx="2"/>
    <g style="animation:bladeSpin 6s linear infinite;transform-origin:0 0">
      <rect x="-2" y="-90" width="4" height="90" fill="#f0f0f0" rx="2" transform="rotate(0)"/>
      <rect x="-2" y="-90" width="4" height="90" fill="#f0f0f0" rx="2" transform="rotate(120)"/>
      <rect x="-2" y="-90" width="4" height="90" fill="#f0f0f0" rx="2" transform="rotate(240)"/>
    </g>
    <circle cx="0" cy="0" r="6" fill="#d0d0d0"/>
  </g>
  
  <!-- Turbine 2 (left, medium) -->
  <g transform="translate(420,440)">
    <rect x="-4" y="0" width="8" height="270" fill="#e0e0e0" rx="3"/>
    <g style="animation:bladeSpin 5s linear infinite;transform-origin:0 0">
      <rect x="-3" y="-120" width="6" height="120" fill="#f0f0f0" rx="3" transform="rotate(30)"/>
      <rect x="-3" y="-120" width="6" height="120" fill="#f0f0f0" rx="3" transform="rotate(150)"/>
      <rect x="-3" y="-120" width="6" height="120" fill="#f0f0f0" rx="3" transform="rotate(270)"/>
    </g>
    <circle cx="0" cy="0" r="8" fill="#d0d0d0"/>
  </g>
  
  <!-- Turbine 3 (center, large) -->
  <g transform="translate(750,380)">
    <rect x="-5" y="0" width="10" height="320" fill="#e0e0e0" rx="3"/>
    <g style="animation:bladeSpin 4.5s linear infinite;transform-origin:0 0">
      <rect x="-3" y="-140" width="6" height="140" fill="#f5f5f5" rx="3" transform="rotate(15)"/>
      <rect x="-3" y="-140" width="6" height="140" fill="#f5f5f5" rx="3" transform="rotate(135)"/>
      <rect x="-3" y="-140" width="6" height="140" fill="#f5f5f5" rx="3" transform="rotate(255)"/>
    </g>
    <circle cx="0" cy="0" r="9" fill="#d0d0d0"/>
  </g>
  
  <!-- Turbine 4 (right, large) -->
  <g transform="translate(1150,400)">
    <rect x="-5" y="0" width="10" height="300" fill="#e0e0e0" rx="3"/>
    <g style="animation:bladeSpin 5.5s linear infinite;transform-origin:0 0">
      <rect x="-3" y="-135" width="6" height="135" fill="#f0f0f0" rx="3" transform="rotate(60)"/>
      <rect x="-3" y="-135" width="6" height="135" fill="#f0f0f0" rx="3" transform="rotate(180)"/>

let supaClient=null;

function initSupabase(){
  try{
    if(typeof supabase!=="undefined"){const sc=supabase.createClient||supabase.default?.createClient;if(sc){
      supaClient=sc(SUPABASE_URL,SUPABASE_KEY);
      console.log("Supabase connected");
      return true;
    }}
  }catch(e){console.error("Supabase init error:",e)}
  return false;
}

async function cloudSave(){
  if(!supaClient){if(!initSupabase())return false}
  syncStatus="saving";renderSyncBadge();
  try{
    const{error}=await supaClient.from("app_data").update({
      turbines:db.turbines,
      spare:db.spare,
      parks:db.parks||[],
      cats:CATS,
      updated_at:new Date().toISOString()
    }).eq("id","main");
    if(error)throw error;
    syncStatus="saved";lastSync=new Date();
    renderSyncBadge();
    setTimeout(()=>{syncStatus="idle";renderSyncBadge()},2000);
    return true;
  }catch(e){
    console.error("Cloud save error:",e);
    syncStatus="error";renderSyncBadge();
    return false;
  }
}

async function cloudLoad(){
  if(!supaClient){if(!initSupabase())return false}
  syncStatus="loading";renderSyncBadge();
  try{
    const{data,error}=await supaClient.from("app_data").select("*").eq("id","main").single();
    if(error)throw error;
    if(data && data.turbines && data.turbines.length>0){
      db.turbines=data.turbines;
      db.spare=data.spare||[];
      db.parks=data.parks||[];
      if(data.cats&&data.cats.length>0){CATS.length=0;data.cats.forEach(c=>CATS.push(c));saveCats()}
      db.turbines.forEach(t=>t.components.forEach(c=>{if(!c.imgs)c.imgs=[]}));
      db.spare.forEach(p=>{if(!p.imgs)p.imgs=[]});
      save();
      syncStatus="loaded";lastSync=new Date();
      renderSyncBadge();
      render();
      setTimeout(()=>{syncStatus="idle";renderSyncBadge()},2000);
      return true;
    } else {
      // Cloud is empty, push local data up
      await cloudSave();
      return true;
    }
  }catch(e){
    console.error("Cloud load error:",e);
    syncStatus="error";renderSyncBadge();
    return false;
  }
}

function renderSyncBadge(){
  const el=document.getElementById("sync-badge");
  if(!el)return;
  const icons={idle:"☁",saving:"⬆",saved:"✓",loading:"⬇",loaded:"✓",error:"✗"};
  const colors={idle:"var(--tx4)",saving:"var(--ylw)",saved:"var(--grn)",loading:"var(--blu)",loaded:"var(--grn)",error:"var(--red)"};
  const labels={idle:"Cloud",saving:"Salvare...",saved:"Salvat!",loading:"Încărcare...",loaded:"Încărcat!",error:"Eroare"};
  el.innerHTML=`<span style="color:${colors[syncStatus]};font-size:10px">${icons[syncStatus]} ${labels[syncStatus]}</span>`;
}

// Override save() to also sync to cloud
const _origSave=save;
function save(){
  _origSave();
  // Debounce cloud save - wait 1 second after last change
  clearTimeout(save._timer);
  save._timer=setTimeout(()=>cloudSave(),1000);
}

  if(initSupabase()){

    const catCounts={};t.components.forEach(c=>{catCounts[c.cat]=(catCounts[c.cat]||0)+1});

/* ═══ MODALS ═══ */
function showMod(c){const m=document.createElement("div");m.className="mo";m.innerHTML=`<div class="ml">${c}</div>`;m.addEventListener("click",e=>{if(e.target===m)closeMod(m.querySelector(".ml"))});document.body.appendChild(m);requestAnimationFrame(()=>m.classList.add("show"));return m}
function closeMod(el){const m=el?.closest?el.closest(".mo"):el;if(m){m.classList.remove("show");setTimeout(()=>m.remove(),200)}}

/* ═══ PHOTO HELPERS ═══ */
function triggerPhotoUpload(wtgId, compIdx, isSpare){
  const inp=document.createElement("input");inp.type="file";inp.accept="image/*";inp.multiple=true;
  inp.onchange=()=>{
    const promises=Array.from(inp.files).map(f=>new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(f)}));
    Promise.all(promises).then(imgs=>{
      if(isSpare){db.spare[compIdx].imgs=(db.spare[compIdx].imgs||[]).concat(imgs)}
      else{const t=db.turbines.find(x=>x.id===wtgId);if(t){t.components[compIdx].imgs=(t.components[compIdx].imgs||[]).concat(imgs)}}
      save();
      // Refresh the modal
      document.querySelectorAll(".mo").forEach(m=>m.remove());
      if(isSpare)editSpare(compIdx);else showComp(wtgId,compIdx);
      render();
    });
  };
  inp.click();
}

function removePhoto(wtgId, compIdx, photoIdx, isSpare){
  if(isSpare){db.spare[compIdx].imgs.splice(photoIdx,1)}
  else{const t=db.turbines.find(x=>x.id===wtgId);if(t)t.components[compIdx].imgs.splice(photoIdx,1)}
  save();document.querySelectorAll(".mo").forEach(m=>m.remove());
  if(isSpare)editSpare(compIdx);else showComp(wtgId,compIdx);
  render();
}

function sendOrderEmail(idx){
  const p=db.spare[idx];if(!p)return;
  const qty=parseInt(document.getElementById('ord-qty').value)||1;
  const notes=document.getElementById('ord-notes').value;
  const total=(p.price||0)*qty;
  const subject=encodeURIComponent(`Comandă: ${p.name} - ${qty} buc`);
  const body=encodeURIComponent(`Bună ziua,\n\nDorim să comandăm:\n\nPiesă: ${p.name}\nPart#: ${p.partNumber||'—'}\nProducător: ${p.manufacturer||'—'}\nCantitate: ${qty} buc\nPreț unitar: ${p.price||'—'} EUR\nTotal estimat: ${total} EUR\n${notes?'\nNote: '+notes+'\n':''}\nVă mulțumim,\nBlue Line Energy`);
  window.open(`mailto:${p.supplier.email}?subject=${subject}&body=${body}`);
}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px">

function addNewPark(){
  const n=document.getElementById("np-n").value;if(!n){alert("Nume obligatoriu!");return}
  const colors=["#60a5fa","#34d399","#a78bfa","#f472b6","#fbbf24","#fb923c","#22d3ee","#f87171","#4ade80"];
  const c=colors[Math.floor(Math.random()*colors.length)];
  if(!db.parks)db.parks=[];
  db.parks.push({
    id:"p"+Date.now(),name:n,type:document.getElementById("np-t").value,
    location:document.getElementById("np-l").value,
    capacity:parseFloat(document.getElementById("np-c").value)||0,
    units:document.getElementById("np-u").value,
    year:parseInt(document.getElementById("np-y").value)||2025,
    details:"",color:c
  });
  save();document.querySelectorAll(".mo").forEach(m=>m.remove());editParks();render();
}

function saveParks(){
  const parks=db.parks||[];
  parks.forEach((p,i)=>{
    const del=document.getElementById("pe-del-"+i);
    if(del&&del.value==="1"){p._del=true;return}
    const n=document.getElementById("pe-n-"+i);if(!n)return;
    p.name=n.value;
    p.capacity=parseFloat(document.getElementById("pe-c-"+i).value)||0;
    p.year=parseInt(document.getElementById("pe-y-"+i).value)||0;
    p.type=document.getElementById("pe-t-"+i).value;
    p.units=document.getElementById("pe-u-"+i).value;
    p.location=document.getElementById("pe-l-"+i).value;
    p.details=document.getElementById("pe-d-"+i).value;
  });
  db.parks=parks.filter(p=>!p._del);
  save();document.querySelectorAll(".mo").forEach(m=>m.remove());render();
}

/* === PARK SELECTION FOR REGISTRY === */
function selectPark(idx){
  const p=(db.parks||[])[idx];
  if(!p)return;
  if(S.parkFilter===p.id){
    // Deselect - show all
    S.parkFilter="all";
  } else {
    S.parkFilter=p.id;
    // Auto-select first turbine from this park
    const parkTurbines=db.turbines.filter(t=>t.parkId===p.id);
    if(parkTurbines.length>0) S.wtg=parkTurbines[0].id;
  }
  render();
}

/* === EXPORT EXCEL === */
function exportRegistry(){
  const t=db.turbines.find(x=>x.id===S.wtg);
  if(!t)return;
  const data=t.components.map((c,i)=>({
    "Nr":i+1,
    "Componentă":c.d,
    "Producător":c.m,
    "Model":c.md,
    "ConstType":c.ct,
    "Descriere":c.ctd,
    "Categorie":c.cat,
    "Note":c.notes||""
  }));
  const ws=XLSX.utils.json_to_sheet(data);
  ws["!cols"]=[{wch:5},{wch:35},{wch:25},{wch:25},{wch:10},{wch:45},{wch:20},{wch:30}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,t.name);
  XLSX.writeFile(wb,`Registru_${t.name.replace(/[^a-zA-Z0-9]/g,"_")}.xlsx`);
}

function exportAllRegistry(){
  const wb=XLSX.utils.book_new();
  db.turbines.forEach(t=>{
    const data=t.components.map((c,i)=>({
      "Nr":i+1,
      "Componentă":c.d,
      "Producător":c.m,
      "Model":c.md,
      "ConstType":c.ct,
      "Descriere":c.ctd,
      "Categorie":c.cat
    }));
    const ws=XLSX.utils.json_to_sheet(data);
    ws["!cols"]=[{wch:5},{wch:35},{wch:25},{wch:25},{wch:10},{wch:45},{wch:20}];
    const name=t.name.substring(0,31).replace(/[\\\/\?\*\[\]]/g,"");
    XLSX.utils.book_append_sheet(wb,ws,name);
  });
  XLSX.writeFile(wb,"Registru_Complet_BLE.xlsx");
}

function exportSpare(){
  const selP=S.sparePark==='all'?null:S.sparePark==='unassigned'?'_none':S.sparePark;
  const list=selP===null?db.spare:selP==='_none'?db.spare.filter(s=>!s.parkId):db.spare.filter(s=>s.parkId===selP);
  const parkName=S.sparePark==='all'?'Toate':S.sparePark==='unassigned'?'Neasignat':((db.parks||[]).find(p=>p.id===S.sparePark)?.name||'');

  const data=list.map((p,i)=>({
    "Nr":i+1,
    "Nume":p.name,
    "Part# / Model":p.partNumber||"",
    "Producător":p.manufacturer||"",
    "Nr. Intern":p.nrIntern||"",
    "Cantitate":p.quantity,
    "Minim":p.minQuantity,
    "Locație":p.location||"",
    "Raft":p.raft||"",
    "Parc":(db.parks||[]).find(pk=>pk.id===p.parkId)?.name||"Neasignat",
    "Preț EUR":p.price||0,
    "Furnizor":p.supplier?.name||"",
    "Contact":p.supplier?.contact||"",
    "Email":p.supplier?.email||"",
    "Telefon":p.supplier?.phone||"",
    "Lead Time (zile)":p.supplier?.leadTimeDays||"",
    "Note":p.notes||""
  }));
  const ws=XLSX.utils.json_to_sheet(data);
  ws["!cols"]=[{wch:5},{wch:30},{wch:20},{wch:20},{wch:12},{wch:8},{wch:8},{wch:18},{wch:10},{wch:22},{wch:10},{wch:22},{wch:18},{wch:25},{wch:15},{wch:12},{wch:30}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Stoc Piese");
  XLSX.writeFile(wb,`Stoc_Piese_${parkName.replace(/[^a-zA-Z0-9]/g,"_")}.xlsx`);
}

function exportParks(){
  const data=(db.parks||[]).map((p,i)=>({
    "Nr":i+1,
    "Parc":p.name,
    "Tip":p.type,
    "Capacitate MW":p.capacity,
    "Unități":p.units,
    "An PIF":p.year,
    "Locație":p.location,
    "Detalii":p.details
  }));
  const ws=XLSX.utils.json_to_sheet(data);
  ws["!cols"]=[{wch:5},{wch:30},{wch:10},{wch:14},{wch:40},{wch:8},{wch:50},{wch:60}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Parcuri");
  XLSX.writeFile(wb,"Parcuri_BLE.xlsx");
}

/* === BACKUP & RESTORE === */
function exportBackup(){
  const backup={
    version:"mm92v22",
    date:new Date().toISOString(),
    turbines:db.turbines,
    spare:db.spare,
    parks:db.parks,
    cats:CATS
  };
  const json=JSON.stringify(backup,null,2);
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`BLE_Backup_${new Date().toISOString().split("T")[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importBackup(){
  const inp=document.createElement("input");
  inp.type="file";
  inp.accept=".json";
  inp.onchange=()=>{
    const f=inp.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=e=>{
      try{
        const backup=JSON.parse(e.target.result);
        if(!backup.turbines&&!backup.spare&&!backup.parks){alert("Fișierul nu conține date valide!");return}
        const msg=`Backup din ${backup.date||"necunoscut"}\n\n`+
          `Turbine: ${backup.turbines?.length||0}\n`+
          `Piese stoc: ${backup.spare?.length||0}\n`+
          `Parcuri: ${backup.parks?.length||0}\n\n`+
          `ATENȚIE: Datele curente vor fi înlocuite!\nContinui?`;
        if(!confirm(msg))return;
        if(backup.turbines)db.turbines=backup.turbines;
        if(backup.spare)db.spare=backup.spare;
        if(backup.parks)db.parks=backup.parks;
        if(backup.cats){CATS.length=0;backup.cats.forEach(c=>CATS.push(c));saveCats()}
        save();
        alert("Backup restaurat cu succes!");
        render();
      }catch(err){alert("Eroare la citirea fișierului: "+err.message)}
    };
    r.readAsText(f);
  };
  inp.click();
}

render();
</script>

.sunset-cloud{position:absolute;border-radius:50%;filter:blur(2px)}
@keyframes driftRight{0%{transform:translateX(-5px)}50%{transform:translateX(5px)}100%{transform:translateX(-5px)}}
@keyframes driftLeft{0%{transform:translateX(5px)}50%{transform:translateX(-5px)}100%{transform:translateX(5px)}}

/* Offshore turbine silhouettes */
.oturbine{position:absolute;bottom:32%}
.oturbine .pole{width:4px;background:linear-gradient(180deg,#1a1008,#2a1a10);position:absolute;bottom:0;left:50%;transform:translateX(-50%);border-radius:2px}
.oturbine .nacelle{width:12px;height:6px;background:#1a1008;position:absolute;top:0;left:50%;transform:translateX(-50%);border-radius:2px}
.oturbine .blades{position:absolute;top:3px;left:50%;transform-origin:0 0}
.oturbine .blade{position:absolute;width:3px;background:linear-gradient(0deg,#2a1a10,#3a2a18);border-radius:2px;transform-origin:bottom center;left:-1.5px}
@keyframes spin1{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spin2{from{transform:rotate(120deg)}to{transform:rotate(480deg)}}
@keyframes spin3{from{transform:rotate(60deg)}to{transform:rotate(420deg)}}

/* Reflection lines for turbines */
.oturbine .reflection{position:absolute;bottom:-40px;left:50%;transform:translateX(-50%);width:2px;height:40px;background:linear-gradient(180deg,rgba(30,20,10,.4),transparent);filter:blur(1px);animation:waterShimmer 3s ease-in-out infinite}

body:not(.theme-sunset) .sunset-scene{display:none}

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>
<body>

</svg>
</div>
